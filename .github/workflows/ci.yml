name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Edition 2024 requires Rust ≥ 1.85.
  RUST_VERSION: "1.95"

jobs:
  # ── Format ──────────────────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ── Lint (clippy) ───────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Unit tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (debug)
        run: cargo test --workspace

  # ── Release-mode tests ──────────────────────────────────────────────────────
  # Catches optimisation-dependent bugs and verifies the release profile compiles.
  test-release:
    name: Tests (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          # Keep release cache separate so it doesn't evict the debug cache.
          key: release
      - name: cargo test (release)
        run: cargo test --workspace --release

  # ── Documentation build ─────────────────────────────────────────────────────
  # Catches broken intra-doc links and missing items before they hit main.
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc
        run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── Security audit ──────────────────────────────────────────────────────────
  # Checks all dependencies against the RustSec advisory database.
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── IMF performance tests ───────────────────────────────────────────────────
  # Downloads imf.ttl and runs the IMF ontology pipeline tests.
  # Kept as a separate job so a slow download does not block the core test suite.
  imf-tests:
    name: IMF Performance Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: imf-tests
      - name: Download IMF ontology
        run: |
          mkdir -p tests/testdata
          curl -fL --retry 3 --retry-delay 5 \
            -o tests/testdata/imf.ttl \
            "https://gitlab.com/imf-lab/spec/imf-ontology/-/raw/develop/owl/imf-ontology.owl.ttl?inline=false"
      - name: cargo test — IMF performance tests
        run: cargo test --test performance imf

