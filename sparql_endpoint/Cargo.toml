[package]
name = "sparql-endpoint"
version = "0.1.0"
edition = "2024"

[dependencies]
dag-rdf = { path = "../dag_rdf" }
sparql-parser = { path = "../sparql_parser" }
turtle-parser = { path = "../turtle_parser" }
axum = { version = "0.8",
    bytes = "1.11.1" }
tokio = { version = "1.52", features = ["full"],
    bytes = "1.11.1" }
tower-http = { version = "0.6", features = ["cors"],
        bytes = "1.11.1"}
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
reqwest = { version = "0.13", features = ["json"],
    rustls-webpki = "0.103" }
urlencoding = "2"
