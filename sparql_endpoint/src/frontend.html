<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dagalog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #1a1a1a;
      background: #fafafa;
    }
    header { border-bottom: 2px solid #222; padding-bottom: 0.75rem; margin-bottom: 1.5rem; }
    header h1 { margin: 0; font-size: 1.6rem; }
    header p  { margin: 0.25rem 0 0; color: #555; font-size: 0.9rem; }
    .triple-count { color: #888; }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { margin: 0 0 0.75rem; font-size: 1.05rem; }
    textarea {
      width: 100%;
      font-family: "Fira Mono", "Consolas", monospace;
      font-size: 0.85rem;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
      background: #f8f8f8;
    }
    textarea:focus { outline: 2px solid #445; background: #fff; }
    .actions { margin-top: 0.6rem; display: flex; align-items: center; gap: 0.75rem; }
    button {
      padding: 0.4rem 1.1rem;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { background: #444; }
    button:disabled { background: #aaa; cursor: default; }
    .hint  { font-size: 0.8rem; color: #777; }
    .result-area { margin-top: 1rem; }
    .msg { font-family: monospace; font-size: 0.85rem; padding: 0.5rem 0.75rem; border-radius: 4px; }
    .msg.ok  { background: #eafaea; color: #1a5c1a; border: 1px solid #a8d8a8; }
    .msg.err { background: #fdecea; color: #7a1a1a; border: 1px solid #f0a0a0; }
    .count   { font-size: 0.85rem; color: #555; margin-bottom: 0.5rem; }
    table { border-collapse: collapse; width: 100%; font-size: 0.85rem; }
    th { background: #f0f0f0; text-align: left; padding: 0.35rem 0.6rem; border: 1px solid #ccc; white-space: nowrap; }
    td { padding: 0.35rem 0.6rem; border: 1px solid #ddd; word-break: break-all; }
    tr:nth-child(even) td { background: #fafafa; }
    .uri     { color: #005a9c; text-decoration: none; }
    .uri:hover { text-decoration: underline; }
    .literal { color: #333; }
    /* Collapsible sections */
    details summary {
      cursor: pointer;
      user-select: none;
      padding: 0.1rem 0;
      list-style: none;
    }
    details summary::-webkit-details-marker { display: none; }
    details summary::before { content: '\25B6\00A0'; font-size: 0.65rem; opacity: 0.6; }
    details[open] summary::before { content: '\25BC\00A0'; }
    /* Resource browser card summaries look like h2 */
    .resource-section summary {
      font-weight: 600;
      font-size: 1.05rem;
      margin-bottom: 0.5rem;
    }
    .resource-section summary:hover { color: #333; }
    /* Prefix manager */
    .prefix-manager { margin-bottom: 0.75rem; }
    .prefix-manager > summary { font-size: 0.85rem; color: #666; }
    .prefix-manager > summary:hover { color: #222; }
    #prefix-list { margin: 0.4rem 0; }
    .prefix-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.12rem 0; font-size: 0.8rem; }
    .prefix-row code { width: 5.5rem; flex-shrink: 0; font-size: 0.78rem; }
    .prefix-ns  { flex: 1; color: #555; font-family: "Fira Mono","Consolas",monospace;
                  font-size: 0.75rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .prefix-del { padding: 0.1rem 0.35rem; background: #eee; color: #666;
                  border: 1px solid #ccc; border-radius: 3px; font-size: 0.75rem;
                  cursor: pointer; line-height: 1; }
    .prefix-del:hover { background: #fdd; color: #900; border-color: #f99; }
    .prefix-add { display: flex; gap: 0.4rem; margin-top: 0.5rem; align-items: center; }
    .prefix-add input { font-size: 0.8rem; padding: 0.25rem 0.4rem;
                        border: 1px solid #ccc; border-radius: 3px; }
    .pfx-name { width: 5.5rem; }
    .pfx-uri  { flex: 1; font-family: "Fira Mono","Consolas",monospace; }
    .prefix-add button { padding: 0.25rem 0.7rem; font-size: 0.8rem; }
    /* Query history */
    .history-panel { margin-top: 0.75rem; }
    .history-panel > summary { font-size: 0.85rem; color: #666; }
    .history-panel > summary:hover { color: #222; }
    #history-list { margin-top: 0.35rem; max-height: 12rem; overflow-y: auto; }
    .history-item { padding: 0.3rem 0.4rem; cursor: pointer; border-radius: 3px;
                    border-bottom: 1px solid #f0f0f0; }
    .history-item:hover { background: #f5f5f5; }
    .history-item:last-child { border-bottom: none; }
    .history-time  { font-size: 0.72rem; color: #999; display: block; }
    .history-query { display: block; font-family: "Fira Mono","Consolas",monospace;
                     font-size: 0.78rem; color: #333; white-space: nowrap;
                     overflow: hidden; text-overflow: ellipsis; }
    /* Resource browser */
    .back-link { display: inline-block; margin-bottom: 0.75rem; font-size: 0.85rem;
                 color: #555; text-decoration: none; }
    .back-link:hover { color: #222; text-decoration: underline; }
    .resource-full-iri { font-family: "Fira Mono","Consolas",monospace; font-size: 0.8rem;
                         color: #555; word-break: break-all; margin-top: 0.2rem; }
    .badge { display: inline-block; background: #e8e8e8; border-radius: 10px;
             padding: 0.1rem 0.45rem; font-size: 0.75rem; font-weight: normal;
             vertical-align: middle; margin-left: 0.4rem; }
    .resource-types { margin: 0.4rem 0 0.2rem; }
    .type-badge { display: inline-block; background: #dce8f5; border-radius: 10px;
                  padding: 0.1rem 0.45rem; font-size: 0.75rem; margin-right: 0.3rem; }
    /* Graph view tabs */
    .tab-bar { display: flex; border-bottom: 2px solid #e0e0e0; margin-bottom: 0.75rem; gap: 0; }
    .tab { padding: 0.4rem 1.1rem; background: none; border: none;
           border-bottom: 3px solid transparent; margin-bottom: -2px;
           color: #666; cursor: pointer; font-size: 0.85rem; font-weight: 500; }
    .tab.active { color: #222; border-bottom-color: #222; }
    .tab:hover:not(.active) { color: #333; background: #f5f5f5; border-radius: 4px 4px 0 0; }
    .cy-wrap { position: relative; }
    #cy { width: 100%; height: 520px; border: 1px solid #ddd; border-radius: 4px;
          background: #f8f8f8; cursor: grab; margin-top: 0.5rem; }
    #cy:active { cursor: grabbing; }
    .graph-hint { font-size: 0.78rem; color: #888; margin: 0.3rem 0 0; }
  </style>
</head>
<body>
  <header>
    <h1>Dagalog</h1>
    <p>RDF triplestore with OWL-RL reasoning and SPARQL 1.1<span id="triple-count" class="triple-count"></span></p>
  </header>

  <!-- ── Query editor view (default) ───────────────────────────────────────── -->
  <div id="query-view">
    <div class="card">
      <h2>SPARQL Query</h2>
      <details class="prefix-manager" id="prefix-details">
        <summary>Prefixes</summary>
        <div id="prefix-list"></div>
        <div class="prefix-add">
          <input class="pfx-name" id="pfx-name" placeholder="prefix" />
          <input class="pfx-uri"  id="pfx-uri"  placeholder="namespace URI" />
          <button onclick="addPrefix()">Add</button>
        </div>
      </details>
      <textarea id="query" rows="7">SELECT ?s ?p ?o WHERE { ?s ?p ?o } LIMIT 10</textarea>
      <div class="actions">
        <button id="run-btn" onclick="runQuery()">Run Query</button>
        <span class="hint">Prefix declarations are added automatically</span>
      </div>
      <details class="history-panel" id="history-details">
        <summary>History</summary>
        <div id="history-list"></div>
      </details>
      <div class="result-area" id="query-result"></div>
    </div>

    <div class="card">
      <h2>Upload RDF Data</h2>
      <textarea id="turtle" rows="7"
        placeholder="Paste Turtle data here&#10;&#10;@prefix ex: &lt;http://example.org/&gt; .&#10;ex:Alice a ex:Person ."></textarea>
      <div class="actions">
        <button id="upload-btn" onclick="uploadData()">Upload Turtle</button>
        <span class="hint">Parsed and merged into the default graph</span>
      </div>
      <div class="result-area" id="upload-result"></div>
    </div>
  </div>

  <!-- ── Resource browser view ──────────────────────────────────────────────── -->
  <div id="resource-view" style="display:none">
    <div class="card">
      <a href="/" class="back-link">&#8592; Back to queries</a>
      <h2 id="resource-heading" style="margin-bottom:0.15rem">Resource</h2>
      <div class="resource-types" id="resource-types"></div>
      <div class="resource-full-iri" id="resource-full-iri"></div>
    </div>

    <div class="card resource-section">
      <details open>
        <summary>Outgoing edges <span class="badge" id="out-count"></span></summary>
        <div id="out-table"></div>
      </details>
    </div>

    <div class="card resource-section">
      <details open>
        <summary>Incoming edges <span class="badge" id="in-count"></span></summary>
        <div id="in-table"></div>
      </details>
    </div>
  </div>

  <script>
    // ── Constants ──────────────────────────────────────────────────────────────
    const RDF_TYPE   = 'http://www.w3.org/1999/02/22-rdf-syntax-ns#type';
    const RDFS_LABEL = 'http://www.w3.org/2000/01/rdf-schema#label';
    const PREFIXES_KEY = 'dagalog-prefixes';
    const HISTORY_KEY  = 'dagalog-history';
    const GRAPH_NODE_LIMIT = 200;

    const DEFAULT_PREFIXES = [
      ['rdf',     'http://www.w3.org/1999/02/22-rdf-syntax-ns#'],
      ['rdfs',    'http://www.w3.org/2000/01/rdf-schema#'],
      ['owl',     'http://www.w3.org/2002/07/owl#'],
      ['xsd',     'http://www.w3.org/2001/XMLSchema#'],
      ['skos',    'http://www.w3.org/2004/02/skos/core#'],
      ['dc',      'http://purl.org/dc/elements/1.1/'],
      ['dcterms', 'http://purl.org/dc/terms/'],
      ['foaf',    'http://xmlns.com/foaf/0.1/'],
      ['schema',  'https://schema.org/'],
    ];

    // ── Prefix manager ─────────────────────────────────────────────────────────
    function getStoredPrefixes() {
      try { return JSON.parse(localStorage.getItem(PREFIXES_KEY)) || DEFAULT_PREFIXES.slice(); }
      catch { return DEFAULT_PREFIXES.slice(); }
    }

    function saveStoredPrefixes(prefixes) {
      localStorage.setItem(PREFIXES_KEY, JSON.stringify(prefixes));
    }

    function renderPrefixList() {
      const list = document.getElementById('prefix-list');
      list.innerHTML = '';
      for (const [pfx, ns] of getStoredPrefixes()) {
        const row = document.createElement('div');
        row.className = 'prefix-row';
        const del = document.createElement('button');
        del.className = 'prefix-del';
        del.textContent = '×';
        del.title = 'Remove';
        del.addEventListener('click', () => {
          saveStoredPrefixes(getStoredPrefixes().filter(([p]) => p !== pfx));
          renderPrefixList();
        });
        const code = document.createElement('code');
        code.textContent = pfx + ':';
        const span = document.createElement('span');
        span.className = 'prefix-ns';
        span.textContent = ns;
        span.title = ns;
        row.append(del, code, span);
        list.appendChild(row);
      }
    }

    function addPrefix() {
      const name = document.getElementById('pfx-name').value.trim().replace(/:$/, '');
      const uri  = document.getElementById('pfx-uri').value.trim();
      if (!name || !uri) return;
      const prefixes = getStoredPrefixes().filter(([p]) => p !== name);
      prefixes.push([name, uri]);
      saveStoredPrefixes(prefixes);
      renderPrefixList();
      document.getElementById('pfx-name').value = '';
      document.getElementById('pfx-uri').value  = '';
    }

    function prependPrefixes(query) {
      const lines = getStoredPrefixes()
        .filter(([pfx]) => !query.includes('PREFIX ' + pfx + ':'))
        .map(([pfx, ns]) => 'PREFIX ' + pfx + ': <' + ns + '>');
      return lines.length ? lines.join('\n') + '\n' + query : query;
    }

    // ── IRI shortening ─────────────────────────────────────────────────────────
    function shortenIri(iri) {
      for (const [pfx, ns] of getStoredPrefixes()) {
        if (iri.startsWith(ns)) return pfx + ':' + iri.slice(ns.length);
      }
      return iri;
    }

    // ── Query history ──────────────────────────────────────────────────────────
    function getHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
      catch { return []; }
    }

    function saveHistory(query, count) {
      const entry   = { query, ts: Date.now(), count };
      const history = [entry, ...getHistory().filter(h => h.query !== query)].slice(0, 50);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('history-list');
      const history = getHistory();
      list.innerHTML = '';
      if (history.length === 0) {
        const p = document.createElement('p');
        p.style.cssText = 'font-size:0.8rem;color:#888;margin:0.25rem 0';
        p.textContent = 'No queries yet.';
        list.appendChild(p);
        return;
      }
      for (const entry of history) {
        const row = document.createElement('div');
        row.className = 'history-item';
        const time = document.createElement('span');
        time.className = 'history-time';
        time.textContent = new Date(entry.ts).toLocaleString()
          + (entry.count != null ? ' · ' + entry.count + ' rows' : '');
        const code = document.createElement('code');
        code.className = 'history-query';
        code.textContent = entry.query;
        row.append(time, code);
        row.addEventListener('click', () => {
          document.getElementById('query').value = entry.query;
        });
        list.appendChild(row);
      }
    }

    // ── IRI cell factory ───────────────────────────────────────────────────────
    function makeIriLink(iri) {
      const a = document.createElement('a');
      a.href = '/?resource=' + encodeURIComponent(iri);
      a.className = 'uri';
      a.textContent = shortenIri(iri);
      a.title = iri;
      return a;
    }

    // ── Shared SPARQL fetch ────────────────────────────────────────────────────
    async function sparqlFetch(query) {
      const resp = await fetch('/sparql', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/sparql-query',
          'Accept': 'application/sparql-results+json',
        },
        body: query,
      });
      const text = await resp.text();
      if (!resp.ok) throw new Error('HTTP ' + resp.status + ': ' + text);
      return JSON.parse(text);
    }

    // ── Shared table renderer ──────────────────────────────────────────────────
    function renderTable(container, data, badgeEl) {
      container.innerHTML = '';
      const vars     = data.head?.vars ?? [];
      const bindings = data.results?.bindings ?? [];

      if (badgeEl) badgeEl.textContent = bindings.length;

      const countEl = document.createElement('p');
      countEl.className = 'count';
      countEl.textContent = bindings.length + ' result' + (bindings.length === 1 ? '' : 's');
      container.appendChild(countEl);

      if (bindings.length === 0 || vars.length === 0) return;

      const table = document.createElement('table');
      const thead = table.createTHead();
      const hrow  = thead.insertRow();
      for (const v of vars) {
        const th = document.createElement('th');
        th.textContent = v;
        hrow.appendChild(th);
      }

      const tbody = table.createTBody();
      for (const binding of bindings) {
        const row = tbody.insertRow();
        for (const v of vars) {
          const td  = row.insertCell();
          const val = binding[v];
          if (!val) continue;
          if (val.type === 'uri') {
            td.appendChild(makeIriLink(val.value));
          } else if (val.type === 'bnode') {
            const span = document.createElement('span');
            span.className = 'literal';
            span.textContent = '_:' + val.value;
            td.appendChild(span);
          } else {
            const span = document.createElement('span');
            span.className = 'literal';
            let text = val.value;
            if (val['xml:lang']) text += ' @' + val['xml:lang'];
            span.textContent = text;
            if (val.datatype) span.title = shortenIri(val.datatype);
            td.appendChild(span);
          }
        }
      }
      container.appendChild(table);
    }

    function showMsg(container, text, ok) {
      container.innerHTML = '';
      const p = document.createElement('p');
      p.className = 'msg ' + (ok ? 'ok' : 'err');
      p.textContent = text;
      container.appendChild(p);
    }

    // ── Store statistics ───────────────────────────────────────────────────────
    async function loadStats() {
      try {
        const data = await sparqlFetch('SELECT (COUNT(*) AS ?n) WHERE { ?s ?p ?o }');
        const n = data.results?.bindings?.[0]?.n?.value;
        if (n != null) {
          document.getElementById('triple-count').textContent =
            ' — ' + Number(n).toLocaleString() + ' triples';
        }
      } catch { /* ignore */ }
    }

    // ── Graph view (P2) ────────────────────────────────────────────────────────
    let cyInstance  = null;
    let lastResults = null;

    function isGraphLike(vars) {
      return vars.length === 3;
    }

    let cytoscapeLoading = null;
    function ensureCytoscape() {
      if (window.cytoscape) return Promise.resolve();
      if (!cytoscapeLoading) {
        cytoscapeLoading = new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js';
          s.onload  = resolve;
          s.onerror = () => reject(new Error('Could not load Cytoscape.js from CDN'));
          document.head.appendChild(s);
        });
      }
      return cytoscapeLoading;
    }

    async function showTab(name) {
      const tablePane = document.getElementById('result-table-pane');
      const graphPane = document.getElementById('result-graph-pane');
      const tabTable  = document.getElementById('tab-table');
      const tabGraph  = document.getElementById('tab-graph');
      if (!tablePane || !graphPane) return;
      if (name === 'table') {
        tablePane.style.display = '';
        graphPane.style.display = 'none';
        tabTable.classList.add('active');
        tabGraph.classList.remove('active');
      } else {
        tablePane.style.display = 'none';
        graphPane.style.display = '';
        tabTable.classList.remove('active');
        tabGraph.classList.add('active');
        if (!cyInstance && lastResults) await renderGraph(lastResults);
      }
    }

    async function renderGraph(data) {
      const container = document.getElementById('cy');
      if (!container) return;
      container.textContent = 'Rendering graph…';

      try {
        await ensureCytoscape();
      } catch (e) {
        container.textContent = e.message;
        return;
      }

      const vars     = data.head?.vars ?? [];
      const bindings = data.results?.bindings ?? [];
      const [sv, pv, ov] = vars;

      const nodeMap = new Map();
      let edges = [];

      for (const b of bindings) {
        const s = b[sv], p = b[pv], o = b[ov];
        if (!s || !p || !o) continue;
        const sId = s.type === 'bnode' ? '_:' + s.value : s.value;
        const oId = o.type === 'bnode' ? '_:' + o.value : o.value;
        if (!nodeMap.has(sId)) nodeMap.set(sId, {
          id: sId,
          label: s.type === 'uri' ? shortenIri(s.value) : '_:' + s.value,
          iri: s.type === 'uri' ? s.value : null,
        });
        if (!nodeMap.has(oId)) nodeMap.set(oId, {
          id: oId,
          label: o.type === 'uri' ? shortenIri(o.value) : '_:' + o.value,
          iri: o.type === 'uri' ? o.value : null,
        });
        edges.push({ s: sId, p: shortenIri(p.value), o: oId });
      }

      const nodes = [...nodeMap.values()];
      const warnEl = document.getElementById('graph-warning');

      if (nodes.length > GRAPH_NODE_LIMIT) {
        warnEl.style.display = '';
        warnEl.textContent =
          'Graph capped at ' + GRAPH_NODE_LIMIT + ' nodes (' + nodes.length +
          ' total). Add LIMIT to your query to reduce results.';
        const allowed = new Set(nodes.slice(0, GRAPH_NODE_LIMIT).map(n => n.id));
        edges = edges.filter(e => allowed.has(e.s) && allowed.has(e.o));
        nodes.splice(GRAPH_NODE_LIMIT);
      } else {
        warnEl.style.display = 'none';
      }

      if (nodes.length === 0) {
        container.textContent = 'No nodes to display.';
        return;
      }

      const elements = [
        ...nodes.map(n => ({ group: 'nodes', data: { id: n.id, label: n.label, iri: n.iri } })),
        ...edges.map((e, i) => ({
          group: 'edges',
          data: { id: 'e' + i, source: e.s, target: e.o, label: e.p },
        })),
      ];

      if (cyInstance) { cyInstance.destroy(); cyInstance = null; }

      cyInstance = cytoscape({
        container,
        elements,
        style: [
          {
            selector: 'node',
            style: {
              label: 'data(label)',
              'font-size': '11px',
              'background-color': '#718096',
              color: '#fff',
              'text-halign': 'center',
              'text-valign': 'center',
              width: 'label',
              height: 'label',
              padding: '8px',
              shape: 'round-rectangle',
              'text-wrap': 'wrap',
              'text-max-width': '140px',
              'border-width': 0,
            },
          },
          {
            selector: 'node[?iri]',
            style: { 'background-color': '#2b6cb0', cursor: 'pointer' },
          },
          {
            selector: 'node:selected',
            style: { 'background-color': '#1a365d', 'border-width': 2, 'border-color': '#fff' },
          },
          {
            selector: 'edge',
            style: {
              label: 'data(label)',
              'font-size': '9px',
              color: '#555',
              'text-rotation': 'autorotate',
              'text-background-color': '#fff',
              'text-background-opacity': 0.85,
              'text-background-padding': '2px',
              'curve-style': 'bezier',
              'target-arrow-shape': 'triangle',
              'line-color': '#b0b0b0',
              'target-arrow-color': '#b0b0b0',
              'arrow-scale': 0.9,
              width: 1.5,
            },
          },
        ],
        layout: {
          name: 'cose',
          padding: 30,
          animate: false,
          nodeOverlap: 20,
          componentSpacing: 50,
          nodeRepulsion: () => 8000,
          edgeElasticity: () => 100,
          idealEdgeLength: () => 80,
        },
      });

      cyInstance.on('tap', 'node', e => {
        const iri = e.target.data('iri');
        if (iri) location.href = '/?resource=' + encodeURIComponent(iri);
      });
    }

    // ── Query editor ───────────────────────────────────────────────────────────
    async function runQuery() {
      const rawQuery = document.getElementById('query').value.trim();
      if (!rawQuery) return;
      const query     = prependPrefixes(rawQuery);
      const btn       = document.getElementById('run-btn');
      const container = document.getElementById('query-result');
      btn.disabled    = true;
      btn.textContent = 'Running…';
      container.innerHTML = '';
      cyInstance  = null;
      lastResults = null;
      try {
        const data  = await sparqlFetch(query);
        const vars  = data.head?.vars ?? [];
        const count = data.results?.bindings?.length ?? null;

        if (isGraphLike(vars)) {
          lastResults = data;
          container.innerHTML =
            '<div class="tab-bar">' +
              '<button class="tab active" id="tab-table" onclick="showTab(\'table\')">Table</button>' +
              '<button class="tab" id="tab-graph" onclick="showTab(\'graph\')">Graph</button>' +
            '</div>' +
            '<div id="result-table-pane"></div>' +
            '<div id="result-graph-pane" style="display:none">' +
              '<p id="graph-warning" class="msg err" style="display:none;margin-bottom:0.5rem"></p>' +
              '<div class="cy-wrap"><div id="cy"></div></div>' +
              '<p class="graph-hint">Scroll to zoom · drag to pan · click a node to browse</p>' +
            '</div>';
          renderTable(document.getElementById('result-table-pane'), data, null);
        } else {
          renderTable(container, data, null);
        }
        saveHistory(rawQuery, count);
      } catch (e) {
        showMsg(container, e.message, false);
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Run Query';
      }
    }

    async function uploadData() {
      const turtle    = document.getElementById('turtle').value.trim();
      if (!turtle) return;
      const btn       = document.getElementById('upload-btn');
      const container = document.getElementById('upload-result');
      btn.disabled    = true;
      btn.textContent = 'Uploading…';
      try {
        const resp = await fetch('/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'text/turtle; charset=utf-8' },
          body: turtle,
        });
        const text = await resp.text();
        showMsg(container, text, resp.ok);
        if (resp.ok) loadStats();
      } catch (e) {
        showMsg(container, 'Request failed: ' + e.message, false);
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Upload Turtle';
      }
    }

    // ── Resource browser ───────────────────────────────────────────────────────
    async function showResourceView(iri) {
      document.getElementById('query-view').style.display    = 'none';
      document.getElementById('resource-view').style.display = '';

      document.getElementById('resource-heading').textContent =
        shortenIri(iri) !== iri ? shortenIri(iri) : 'Resource';
      document.getElementById('resource-full-iri').textContent = iri;
      document.getElementById('resource-types').innerHTML = '';

      const outEl = document.getElementById('out-table');
      const inEl  = document.getElementById('in-table');
      outEl.textContent = 'Loading…';
      inEl.textContent  = 'Loading…';

      const [outData, inData] = await Promise.all([
        sparqlFetch('SELECT ?p ?o WHERE { <' + iri + '> ?p ?o } ORDER BY ?p')
          .catch(e => ({ _error: e.message })),
        sparqlFetch('SELECT ?s ?p WHERE { ?s ?p <' + iri + '> } ORDER BY ?p LIMIT 200')
          .catch(e => ({ _error: e.message })),
      ]);

      if (!outData._error) {
        const bindings = outData.results?.bindings ?? [];
        let label = null;
        const types = [];
        for (const b of bindings) {
          if (b.p?.value === RDFS_LABEL && !label) label = b.o?.value;
          if (b.p?.value === RDF_TYPE && b.o?.type === 'uri') types.push(b.o.value);
        }
        if (label) document.getElementById('resource-heading').textContent = label;
        const typesEl = document.getElementById('resource-types');
        for (const t of types) {
          const span = document.createElement('span');
          span.className = 'type-badge';
          span.textContent = shortenIri(t);
          span.title = t;
          typesEl.appendChild(span);
        }
      }

      if (outData._error) showMsg(outEl, outData._error, false);
      else renderTable(outEl, outData, document.getElementById('out-count'));

      if (inData._error) showMsg(inEl, inData._error, false);
      else renderTable(inEl, inData, document.getElementById('in-count'));
    }

    // ── Page-load routing ──────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      renderPrefixList();
      renderHistory();
      loadStats();
      const params   = new URLSearchParams(location.search);
      const resource = params.get('resource');
      const query    = params.get('query');
      if (resource) {
        showResourceView(resource);
      } else if (query) {
        document.getElementById('query').value = query;
        runQuery();
      }
    });
  </script>
</body>
</html>
